<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لذیذ ریسٹورنٹ | ذائقہ جو یاد رہے</title>
    <style>
        /* CSS ری سیٹ اور بنیادی سیٹنگز */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #fcfbfa;
            color: #333;
            line-height: 1.6;
        }
        a {
            text-decoration: none;
            color: inherit;
        }
        ul {
            list-style: none;
        }

        /* نیویگیشن بار (Header) */
        header {
            background-color: #ffffff;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
        }
        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #ff4757;
        }
        .nav-links {
            display: flex;
        }
        .nav-links li {
            margin-left: 20px;
        }
        .nav-links a {
            font-weight: 600;
            transition: color 0.3s;
        }
        .nav-links a:hover {
            color: #ff4757;
        }

        /* ہوم پیج (Hero Section) */
        #home {
            height: 100vh;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1517248135467-4c7edcad34c4?w=1200') no-repeat center center/cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            color: white;
            padding: 0 20px;
        }
        #home h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }
        #home p {
            font-size: 20px;
            margin-bottom: 30px;
        }
        .btn {
            background-color: #ff4757;
            color: white;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 18px;
            font-weight: bold;
            transition: background 0.3s;
        }
        .btn:hover {
            background-color: #e84118;
        }

        /* عام سیکشن اسٹائلنگ */
        section {
            padding: 80px 8%;
            text-align: center;
        }
        .section-title {
            font-size: 32px;
            margin-bottom: 40px;
            position: relative;
            display: inline-block;
        }
        .section-title::after {
            content: '';
            width: 50%;
            height: 3px;
            background-color: #ff4757;
            position: absolute;
            bottom: -10px;
            left: 25%;
        }

        /* ہمارے بارے میں (About Us) */
        #about {
            background-color: #fff;
        }
        .about-content {
            max-width: 800px;
            margin: 0 auto;
            font-size: 18px;
        }

        /* مینیو (Menu) */
        #menu {
            background-color: #f9f9f9;
        }
        .menu-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px;
        }
        .menu-item {
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.3s;
        }
        .menu-item:hover {
            transform: translateY(-5px);
        }
        .menu-item img {
            width: 100%;
            height: 200px;
            border-radius: 8px;
            object-fit: cover;
        }
        .menu-item h3 {
            margin: 15px 0 10px;
        }
        .menu-item .price {
            color: #ff4757;
            font-weight: bold;
            font-size: 20px;
        }

        /* سروسز (Services) */
        #services {
            background-color: #fff;
        }
        .services-container {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 20px;
        }
        .service-box {
            flex: 1;
            min-width: 250px;
            padding: 30px;
            background: #fdfdfd;
            border: 1px solid #eee;
            border-radius: 8px;
        }
        .service-box h3 {
            margin-bottom: 15px;
            color: #ff4757;
        }

        /* بلاگ (Blog) */
        #blog {
            background-color: #f9f9f9;
        }
        .blog-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }
        .blog-post {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            text-align: right;
        }
        .blog-post img {
            width: 100%;
            height: 220px;
            object-fit: cover;
        }
        .blog-content {
            padding: 20px;
        }
        .blog-content h3 {
            margin-bottom: 10px;
        }
        .blog-content .read-more {
            color: #ff4757;
            font-weight: bold;
            display: inline-block;
            margin-top: 15px;
        }

        /* رابطہ کریں (Contact Us) */
        #contact {
            background-color: #fff;
        }
        .contact-form {
            max-width: 600px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .contact-form input, .contact-form textarea {
            width: 100%;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }
        .contact-form button {
            background-color: #ff4757;
            color: white;
            border: none;
            padding: 15px;
            font-size: 18px;
